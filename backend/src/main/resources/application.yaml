spring:
  application:
    name: fyo

  datasource:
    url: jdbc:postgresql://localhost:5432/fyo_platform
    username: fyo_user
    password: fyo_password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081
