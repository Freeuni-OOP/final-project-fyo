spring:
  application:
    name: fyo

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fyo_platform}
    username: ${SPRING_DATASOURCE_USERNAME:fyo_user}
    password: ${SPRING_DATASOURCE_PASSWORD:fyo_password}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  # Railway and most PaaS inject the port to bind on as PORT.
  port: ${PORT:8081}
